[env:pico]
; Dual USB CDC (control + console) needs Adafruit TinyUSB, which needs a fork
platform = https://github.com/maxgerhardt/platform-raspberrypi.git#03bb48f3d54b02f8fbe53b9e0543920a0177e466
board = pico
framework = arduino
board_build.core = earlephilhower
lib_deps = adafruit/Adafruit TinyUSB Library@3.7.7
build_flags = -DUSE_TINYUSB

[env:nano33ble]
; Adafruit nRF52 core (same Adafruit TinyUSB API as the Pico, not the Nano's)
; best-effort, untested on hardware
platform = nordicnrf52@10.10.0
board = adafruit_feather_nrf52840
framework = arduino
lib_deps = adafruit/Adafruit TinyUSB Library@3.7.7
build_flags = -DUSE_TINYUSB -DCFG_TUD_CDC=2 -DARDUINO_NRF52_ADAFRUIT